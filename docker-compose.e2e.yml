# docker-compose.e2e.yml — E2E test orchestration for Freeplane gRPC plugin
#
# Usage:
#   docker compose -f docker-compose.e2e.yml run --rm e2e-test
#
# This service runs the unified E2E test script inside the Dockerfile.e2e
# container, with Xvfb display mounted for headless Freeplane execution.

services:
  e2e-test:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      - DISPLAY=:99
      - _JAVA_AWT_WM_NONREPARENTING=1
    volumes:
      - .:/workspace:rw
    command:
      - bash
      - -c
      - |
        echo "Starting E2E test suite..."
        bash misc/scripts/run-e2e-tests.sh
