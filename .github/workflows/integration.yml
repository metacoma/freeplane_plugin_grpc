name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency: integration-${{ github.ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: grpc/ruby

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb xauth openbox procps netcat-openbsd

      - name: Set Freeplane version
        run: |
          echo "FREEPLANE_VERSION=1.12.18" >> "$GITHUB_ENV"
          echo "PLUGIN_VERSION=0.0.9" >> "$GITHUB_ENV"

      - name: Cache Freeplane binary
        id: cache-freeplane
        uses: actions/cache@v4
        with:
          path: ~/.freeplane-cache
          key: freeplane-bin-${{ env.FREEPLANE_VERSION }}
          restore-keys: |
            freeplane-bin-

      - name: Download and extract Freeplane
        run: |
          FREEPLANE_DIR="$HOME/.freeplane-cache/freeplane-${FREEPLANE_VERSION}"
          if [ ! -d "$FREEPLANE_DIR" ]; then
            echo "Downloading Freeplane ${FREEPLANE_VERSION} binary..."
            curl -sL "https://github.com/freeplane/freeplane/releases/download/release-${FREEPLANE_VERSION}/freeplane_bin-${FREEPLANE_VERSION}.zip" -o /tmp/freeplane.zip
            mkdir -p "$HOME/.freeplane-cache"
            unzip -q /tmp/freeplane.zip -d "$HOME/.freeplane-cache"
            rm /tmp/freeplane.zip
          fi
          echo "FREEPLANE_DIR=$FREEPLANE_DIR" >> "$GITHUB_ENV"
          echo "--- Verifying Freeplane binary ---"
          test -f "$FREEPLANE_DIR/freeplane.sh" && echo "freeplane.sh: OK" || { echo "freeplane.sh: MISSING"; exit 1; }
          test -d "$FREEPLANE_DIR/plugins" && echo "plugins/ dir: OK" || { echo "plugins/ dir: MISSING"; exit 1; }

      - name: Install gRPC plugin
        run: |
          PLUGIN_TAR="/tmp/org.freplane.plugin.grpc.tar.gz"
          if [ ! -f "$PLUGIN_TAR" ]; then
            echo "Downloading gRPC plugin ${PLUGIN_VERSION}..."
            curl -sL "https://github.com/metacoma/freeplane_plugin_grpc/releases/download/${PLUGIN_VERSION}/org.freplane.plugin.grpc.tar.gz" -o "$PLUGIN_TAR"
          fi
          echo "Installing plugin into Freeplane..."
          tar xzf "$PLUGIN_TAR" -C "$FREEPLANE_DIR/plugins/"
          echo "--- Verifying plugin installation ---"
          test -d "$FREEPLANE_DIR/plugins/org.freeplane.plugin.grpc/lib" && echo "plugin lib/: OK" || { echo "plugin lib/: MISSING"; exit 1; }
          test -f "$FREEPLANE_DIR/plugins/org.freeplane.plugin.grpc/META-INF/MANIFEST.MF" && echo "plugin MANIFEST.MF: OK" || { echo "plugin MANIFEST.MF: MISSING"; exit 1; }

      - name: Start Xvfb and window manager
        run: |
          source misc/scripts/start-xvfb-freeplane-env.sh
          echo "DISPLAY_NUM=$DISPLAY_NUM" >> "$GITHUB_ENV"

      - name: Start Freeplane
        run: |
          export DISPLAY=":$DISPLAY_NUM"
          export _JAVA_AWT_WM_NONREPARENTING=1
          mkdir -p /tmp/freeplane-xvfb
          MINDMAP_FILE="/tmp/freeplane-xvfb/smoke_test_map.mm"
          if [ -f grpc/python/examples/test_blank_map.mm ]; then
            cp grpc/python/examples/test_blank_map.mm "$MINDMAP_FILE"
          else
            cat > "$MINDMAP_FILE" <<'MMEOF'
          <map version="freeplane 1.9.0">
          <node TEXT="Smoke Test Map" FOLDED="false" ID="ID_00000001" CREATED="0000000000000" MODIFIED="0000000000000">
          </node>
          </map>
          MMEOF
          fi
          "$FREEPLANE_DIR/freeplane.sh" "$MINDMAP_FILE" > /tmp/freeplane-xvfb/freeplane.log 2>&1 &
          FREEPLANE_PID=$!
          echo "$FREEPLANE_PID" > /tmp/freeplane-xvfb/freeplane.pid
          echo "FREEPLANE_PID=$FREEPLANE_PID" >> "$GITHUB_ENV"
          echo "Freeplane started (PID $FREEPLANE_PID)"

      - name: Wait for gRPC server readiness
        run: |
          GRPC_HOST="127.0.0.1"
          GRPC_PORT="50051"

          echo "=== TCP readiness check (up to 120s) ==="
          GRPC_READY=false
          for i in $(seq 1 60); do
            if nc -z "$GRPC_HOST" "$GRPC_PORT" 2>/dev/null; then
              GRPC_READY=true
              echo "gRPC TCP port ready after $((i * 2)) seconds"
              break
            fi
            sleep 2
          done
          if [ "$GRPC_READY" != "true" ]; then
            echo "ERROR: gRPC TCP port did not become ready within 120 seconds"
            echo "--- Freeplane log (last 50 lines) ---"
            tail -50 /tmp/freeplane-xvfb/freeplane.log || true
            exit 1
          fi

          echo "=== gRPC-level readiness check (up to 120s) ==="
          pip install --quiet grpcio protobuf
          MAP_READY=false
          for i in $(seq 1 60); do
            RESULT=$(GRPC_HOST="$GRPC_HOST" GRPC_PORT="$GRPC_PORT" GRPC_TIMEOUT="3" \
              python3 misc/scripts/_check_grpc_map.py 2>/dev/null || true)
            if [ "$RESULT" = "OK" ]; then
              MAP_READY=true
              echo "MindMap mode activated after $((i * 2)) seconds"
              break
            fi
            sleep 2
          done
          if [ "$MAP_READY" != "true" ]; then
            echo "ERROR: gRPC server ready but no map available after 120 seconds"
            echo "--- Freeplane log (last 30 lines) ---"
            tail -30 /tmp/freeplane-xvfb/freeplane.log || true
            exit 1
          fi

      - name: Open blank map via gRPC
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'grpc/python')
          from freeplane_pb2 import OpenMapRequest
          import freeplane_pb2_grpc, grpc
          stub = freeplane_pb2_grpc.FreeplaneStub(grpc.insecure_channel('127.0.0.1:50051'))
          resp = stub.OpenMap(OpenMapRequest(file_path='/tmp/freeplane-xvfb/smoke_test_map.mm'), timeout=10)
          assert resp.success, 'OpenMap failed'
          print('OpenMap OK')
          "

      - name: Run Ruby integration tests
        run: |
          cd grpc/ruby
          FREEPLANE_HOST=127.0.0.1 FREEPLANE_PORT=50051 bundle exec rspec spec/integration/

      - name: Install Node.js dependencies
        working-directory: grpc/nodejs
        run: npm ci

      - name: Re-open blank map for Node.js tests
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'grpc/python')
          from freeplane_pb2 import OpenMapRequest
          import freeplane_pb2_grpc, grpc
          stub = freeplane_pb2_grpc.FreeplaneStub(grpc.insecure_channel('127.0.0.1:50051'))
          resp = stub.OpenMap(OpenMapRequest(file_path='/tmp/freeplane-xvfb/smoke_test_map.mm'), timeout=10)
          assert resp.success, 'OpenMap failed'
          print('OpenMap OK')
          "

      - name: Run Node.js integration tests
        run: |
          cd grpc/nodejs
          FREEPLANE_HOST=127.0.0.1 FREEPLANE_PORT=50051 npx jest --testPathPattern=test/integration --verbose --runInBand

      - name: Re-open blank map for Python tests
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'grpc/python')
          from freeplane_pb2 import OpenMapRequest
          import freeplane_pb2_grpc, grpc
          stub = freeplane_pb2_grpc.FreeplaneStub(grpc.insecure_channel('127.0.0.1:50051'))
          resp = stub.OpenMap(OpenMapRequest(file_path='/tmp/freeplane-xvfb/smoke_test_map.mm'), timeout=10)
          assert resp.success, 'OpenMap failed'
          print('OpenMap OK')
          "

      - name: Run Python smoke tests
        run: |
          pip install --quiet grpcio protobuf
          python3 grpc/python/examples/modify_mindmap_example.py
          python3 grpc/python/examples/test_json_roundtrip.py

      - name: Upload Freeplane log on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: freeplane-log
          path: /tmp/freeplane-xvfb/freeplane.log
          if-no-files-found: ignore

      - name: Cleanup Freeplane and Xvfb
        if: always()
        run: |
          # Stop Freeplane
          if [ -f /tmp/freeplane-xvfb/freeplane.pid ]; then
            FP_PID=$(cat /tmp/freeplane-xvfb/freeplane.pid)
            if kill -0 "$FP_PID" 2>/dev/null; then
              echo "Stopping Freeplane (PID $FP_PID)..."
              kill "$FP_PID" 2>/dev/null || true
              waited=0
              while [ $waited -lt 15 ]; do
                kill -0 "$FP_PID" 2>/dev/null || break
                sleep 1
                waited=$((waited + 1))
              done
              if kill -0 "$FP_PID" 2>/dev/null; then
                echo "Freeplane did not exit gracefully — sending SIGKILL"
                kill -9 "$FP_PID" 2>/dev/null || true
              fi
            fi
          fi

          # Stop Xvfb and window manager
          bash misc/scripts/stop-xvfb-freeplane-env.sh || true
