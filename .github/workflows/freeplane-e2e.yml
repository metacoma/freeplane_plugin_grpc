# freeplane-e2e.yml — GitHub Actions CI/CD for Freeplane gRPC plugin
#
# Triggers: push, pull_request on main and develop branches
# Jobs:
#   unit-tests  - Run Python pytest + Ruby rspec (stubbed unit tests)
#   e2e-test    - Run full E2E tests (Freeplane build + smoke tests)

name: Freeplane E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Unit tests (no Freeplane required — stubbed tests)
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit tests (${{ matrix.os }} / Python ${{ matrix.python }} / Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.12"]
        ruby: ["3.2", "3.3"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: grpc/ruby

      - name: Install Python dependencies
        run: |
          pip install --quiet "grpcio>=1.60.0" "protobuf>=4.25.0" "pytest>=8.0"
          pip install -e "grpc/python[dev]" --quiet

      - name: Run Python unit tests
        run: |
          cd grpc/python
          pytest -v tests/

      - name: Run Ruby unit tests
        run: |
          cd grpc/ruby
          bundle exec rspec

  # -----------------------------------------------------------------------
  # E2E test (requires Freeplane build — runs on schedule + manual trigger)
  # -----------------------------------------------------------------------
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    # Run on push/PR only; also supports manual trigger and cron
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: grpc/ruby

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb openbox netcat-openbsd xauth procps gradle

      - name: Install Python gRPC dependencies
        run: |
          pip install --quiet "grpcio>=1.60.0" "protobuf>=4.25.0"

      - name: Run E2E tests
        run: |
          bash misc/scripts/run-e2e-tests.sh
        env:
          DISPLAY: ":99"
          _JAVA_AWT_WM_NONREPARENTING: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            /tmp/freeplane-xvfb/freeplane.log
            /tmp/freeplane-xvfb/xvfb.log
            /tmp/freeplane-xvfb/wm.log
          retention-days: 7
